# Kernel receive-buffer cap for the strafer Cyclone DDS tuning.
#
# config/cyclonedds.xml asks Cyclone for a 16 MB receive socket buffer to
# stop ~921 KB fragmented depth frames from being dropped at the receiver
# under load. The OS clamps that request to net.core.rmem_max, which
# defaults to ~208 KB on the Jetson — so without this raise the Cyclone
# setting is inert and depth still drops.
#
# Install once per host (both the sim-in-the-loop Jetson and the real robot):
#     sudo cp config/99-cyclonedds-rmem.conf /etc/sysctl.d/ && sudo sysctl --system
# Verify: cat /proc/sys/net/core/rmem_max  (expect 16777216)
net.core.rmem_max=16777216
