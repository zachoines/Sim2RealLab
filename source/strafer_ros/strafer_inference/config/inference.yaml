strafer_inference:
  ros__parameters:
    # TODO: point at an exported policy artifact once one is available.
    # Empty string is the "no model loaded" sentinel; load_policy() is
    # skipped, the navigate_to_pose action server is NOT advertised,
    # and the autonomy-side JetsonRosClient falls back to nav2 for any
    # mission that selects strafer_direct.
    model_path: ""

    policy_variant: "DEPTH"

    infer_period_s: 0.0333333

    # Node-level contract name; inference.launch.py remaps it to the
    # shared /cmd_vel that the RoboClaw driver and the sim bridge
    # actually consume (same remap driver.launch.py applies).
    cmd_vel_topic: "/strafer/cmd_vel"
    # Status telemetry (accepted goal at accept + ~1 Hz keep-alive while a
    # mission executes) consumed by the subgoal generator's replan
    # ownership. NOT a command channel: navigate_to_pose is the only way
    # to command a mission.
    active_goal_topic: "/strafer_inference/active_goal"
    active_goal_keepalive_period_s: 1.0
    depth_topic: "/d555/depth/image_rect_raw"
    # Rolling subgoal pose (subgoal variants only); published by the
    # strafer_subgoal_generator node. Subscribed only when the loaded
    # variant declares subgoal_* fields.
    subgoal_topic: "/strafer/subgoal"
    imu_topic: "/d555/imu/filtered"
    joint_states_topic: "/strafer/joint_states"
    odom_topic: "/strafer/odom"
    map_frame: "map"
    base_frame: "base_link"

    tf_max_age_s: 0.5
    obs_timeout_s: 0.2
    depth_timeout_s: 0.5
    # Rolling-subgoal freshness (subgoal variants only). The inference half of
    # a split stale-plan budget: the generator stops publishing the subgoal
    # ~1.0 s after its plan source dies (planner down / replanning stopped),
    # then this window trips ~1.0 s later, so the two compose to ~2.0 s before
    # /cmd_vel zero-twists. Longer than obs/depth because the generator
    # replans on a ~0.5 s cadence, not every tick.
    path_timeout_s: 1.0

    # vel_cap_* default to the indoor-safety Nav2 cap (a NAV_VEL_SCALE
    # fraction of the chassis maximum) that strafer_navigation uses on
    # every lane. Set an explicit cap here only for an intentional
    # per-node override.

    goal_reached_distance_m: 0.25
    mission_timeout_s: 60.0

    # ONNX Runtime provider preference, in priority order. ORT binds the
    # first provider whose libs load and silently drops to the next; the
    # node logs the bound set at startup ("active providers"). The fallback
    # chain also lets a dev workstation without TRT still load.
    #
    # Per-variant recommendation (measured on Orin Nano, JetPack 6.2):
    #   DEPTH / DEPTH_SUBGOAL (4819-dim): keep TRT first. TRT runs the whole
    #     graph at ~4.7 ms; CUDA-EP ~7.5 ms; CPU-EP ~84 ms — 2.5x OVER the
    #     33 ms (30 Hz) control budget, so a GPU EP is REQUIRED here.
    #   NOCAM / NOCAM_SUBGOAL (19-dim MLP): prefer CPU. The MLP runs in
    #     ~0.056 ms on CPU vs ~0.23 ms on TRT — GPU kernel-launch overhead
    #     exceeds the math. Override per-variant in the env file with
    #     onnx_providers=[CPUExecutionProvider] (all three meet budget, but
    #     CPU is fastest and skips the engine build / GPU context).
    onnx_providers:
      - "TensorrtExecutionProvider"
      - "CUDAExecutionProvider"
      - "CPUExecutionProvider"

    # ONNX intra-op threads. 1 fits the small MLP policies (~50 us/inf);
    # ORT's default (all cores, spin-waiting) starves the rest of the
    # stack. Raise only for a conv-heavy variant (e.g. DEPTH). Governs only
    # the CPU intra-op pool — it does not throttle the TRT/CUDA EP, whose
    # kernels run on the GPU with their own host-side threads.
    onnx_intra_op_threads: 1

    # TensorRT engine cache. The TRT EP builds the engine on first inference;
    # for DEPTH_SUBGOAL that is a ~90 s cold start on Orin Nano. Persisting it
    # to a stable, writable path lets relaunches deserialize the engine
    # instead of rebuilding. The node expanduser's ~ and creates the dir.
    # enable=false or an empty path keeps the plain provider list (rebuild
    # every launch). The cache is invalidated automatically on a model / ORT /
    # TensorRT version change, so it is safe to leave enabled.
    trt_engine_cache_enable: true
    trt_engine_cache_path: "~/.cache/strafer_inference/trt_engines"
