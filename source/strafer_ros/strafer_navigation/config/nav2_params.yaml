# Nav2 parameters for the GoBilda Strafer robot.
#
# Tuned for:
#   - Mecanum holonomic drive (MPPI controller with Omni model)
#   - Intel RealSense D555 depth → virtual 2D laser scan (/scan)
#   - RTAB-Map providing map + localization (no AMCL / map_server needed)
#   - Jetson Orin NX compute budget
#
# Values marked "— overridden at launch" are replaced at runtime from
# strafer_shared.constants by navigation.launch.py.
#
# Values marked "TUNE:" are likely candidates for real-world adjustment.

# =============================================================================
# BT Navigator
# =============================================================================

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /strafer/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    # Uses default BT: navigate_to_pose_w_replanning_and_recovery.xml
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

# =============================================================================
# Controller Server — MPPI (holonomic/mecanum support)
#
# MPPI is the only Nav2 controller with a native Omni motion model that
# produces vx + vy + wz commands for mecanum drive.
# =============================================================================

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5     # TUNE: meters — increase if robot stalls on carpet
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15           # TUNE: meters — how close to goal before "arrived"
      yaw_goal_tolerance: 0.20          # TUNE: radians — heading tolerance at goal

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000                  # TUNE: reduce to ~1000 if Jetson CPU is overloaded
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.5                       # Default — overridden at launch from NAV_LINEAR_VEL
      vx_min: -0.35                     # Default — overridden at launch from NAV_REVERSE_VEL
      vy_max: 0.5                       # Default — overridden at launch from NAV_LINEAR_VEL
      wz_max: 1.9                       # Default — overridden at launch from NAV_ANGULAR_VEL
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3                  # TUNE: lower = greedier trajectory selection
      gamma: 0.015
      motion_model: "Omni"              # mecanum / holonomic
      visualize: false
      retry_attempt_limit: 1
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        - "ConstraintCritic"
        - "CostCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
        - "TwirlingCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0               # TUNE: lower for more strafing, higher to prefer forward
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 0
      TwirlingCritic:
        enabled: true
        twirling_cost_power: 1
        twirling_cost_weight: 10.0      # TUNE: penalizes unnecessary rotation for omni robots

# =============================================================================
# Planner Server (NavFn — defaults)
# =============================================================================

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# =============================================================================
# Smoother Server (SimpleSmoother — defaults)
# =============================================================================

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

# =============================================================================
# Behavior Server (recovery behaviors)
# =============================================================================

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    assisted_teleop:
      plugin: "nav2_behaviors/AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0             # Default — overridden at launch from NAV_ANGULAR_VEL
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2             # TUNE: rad/s² — may need lowering if spin recovery is jerky

# =============================================================================
# Local Costmap (rolling window around robot)
# =============================================================================

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3                          # TUNE: meters — local planning window
      height: 3
      resolution: 0.05                  # Default — overridden at launch from MAP_RESOLUTION
      # footprint — overridden at launch from TRACK_WIDTH x CHASSIS_LENGTH
      footprint: "[[0.216, 0.214], [0.216, -0.214], [-0.216, -0.214], [-0.216, 0.214]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0       # Default — overridden at launch from DEPTH_MAX
          raytrace_min_range: 0.4       # Default — overridden at launch from DEPTH_MIN
          obstacle_max_range: 5.0
          obstacle_min_range: 0.4       # Default — overridden at launch from DEPTH_MIN
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0        # TUNE: higher = costs drop faster with distance
        inflation_radius: 0.55          # TUNE: meters — keep > half of TRACK_WIDTH (0.214m)
      always_send_full_costmap: true

# =============================================================================
# Global Costmap (full map from RTAB-Map)
# =============================================================================

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # footprint — overridden at launch from TRACK_WIDTH x CHASSIS_LENGTH
      footprint: "[[0.216, 0.214], [0.216, -0.214], [-0.216, -0.214], [-0.216, 0.214]]"
      resolution: 0.05                  # Default — overridden at launch from MAP_RESOLUTION
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        map_topic: /rtabmap/map
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 6.0       # Default — overridden at launch from DEPTH_MAX
          raytrace_min_range: 0.4       # Default — overridden at launch from DEPTH_MIN
          obstacle_max_range: 5.0
          obstacle_min_range: 0.4       # Default — overridden at launch from DEPTH_MIN
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0        # TUNE: higher = costs drop faster with distance
        inflation_radius: 0.55          # TUNE: meters — keep > half of TRACK_WIDTH (0.214m)
      always_send_full_costmap: true

# =============================================================================
# Waypoint Follower (WaitAtWaypoint — defaults)
# =============================================================================

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

# =============================================================================
# Velocity Smoother
# =============================================================================

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # [vx, vy, wz] — overridden at launch from constants
    max_velocity: [0.5, 0.5, 1.9]
    min_velocity: [-0.35, -0.5, -1.9]
    max_accel: [2.5, 2.5, 3.2]         # TUNE: m/s² — may need lowering for heavier payloads
    max_decel: [-2.5, -2.5, -3.2]
    odom_topic: /strafer/odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
