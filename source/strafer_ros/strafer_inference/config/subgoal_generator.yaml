strafer_subgoal_generator:
  ros__parameters:
    # Fallback plan input only — the primary path arrives through this
    # node's own ComputePathToPose action requests. /plan is the Nav2
    # stock default and is not remapped in this repo; confirm at runtime
    # on the Jetson and add a remap (or override this) if the planner is
    # namespaced.
    plan_topic: "/plan"

    # Replan ownership: while the inference node's active-goal telemetry
    # is fresh, request ComputePathToPose on this cadence. Must stay below
    # path_timeout_s (the plan-staleness suppression window) or the plan
    # goes stale between replans.
    replan_period_s: 0.5
    active_goal_topic: "/strafer_inference/active_goal"
    # Telemetry keep-alive is ~1 Hz from the inference node; 2.5 s
    # tolerates one missed message plus publish jitter before
    # replanning stops.
    goal_telemetry_timeout_s: 2.5
    planner_action: "/compute_path_to_pose"
    planner_id: "GridBased"

    # Dedicated rolling-subgoal topic. The mission goal is NOT a topic --
    # it reaches the inference node via its navigate_to_pose action, and
    # a new goal there resets the policy's hidden state; the streamed
    # subgoal must stay on its own channel.
    subgoal_topic: "/strafer/subgoal"

    map_frame: "map"
    base_frame: "base_link"

    # update_period_s and lookahead_m are intentionally omitted: the node
    # defaults update_period_s to POLICY_SIM_DT * POLICY_DECIMATION and
    # lookahead_m to SUBGOAL_LOOKAHEAD_M (both from strafer_shared.constants)
    # so neither the policy rate nor the train/deploy parity surface can
    # drift via a config literal. Set either here only for a deliberate
    # operator override (e.g. a band-aware lookahead experiment).

    # 0 means "use the path as published"; >= 2 head-first truncates.
    max_path_points: 0

    # Stop publishing the rolling subgoal once /plan ages past this, so a
    # dead / wedged global planner propagates to the inference node's subgoal
    # watchdog instead of the policy chasing a stale path. The generator half
    # of a split budget: this ~1.0 s plus the inference watchdog's ~1.0 s
    # compose to ~2.0 s end-to-end before /cmd_vel zero-twists.
    path_timeout_s: 1.0
