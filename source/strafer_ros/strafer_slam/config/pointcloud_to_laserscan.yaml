# pointcloud_to_laserscan parameters for the D555 camera.
#
# Projects the timestamp-fixed depth pointcloud (/d555/depth/color/points_sync)
# into a 2D virtual laser scan in base_link frame. The min/max_height filter
# excludes floor and above-body pixels — depthimage_to_laserscan's per-column
# min over a vertical row window produced a phantom arc at ~3.5 m wherever
# the camera's downward FOV cone clipped the floor.
#
# Camera mount: CAMERA_OFFSET_Z = 0.25 m. Body height ~ 0.30 m. The
# 0.05 → 0.30 m band keeps the camera's horizon-level returns without
# capturing the floor or the operator's head.

pointcloud_to_laserscan:
  ros__parameters:
    target_frame: base_link
    # Wide enough to tolerate sim-in-the-loop bridge jitter; the cloud
    # frame's TF chain to base_link is fully static so this only relaxes
    # the wall-clock window, not the kinematic validity.
    transform_tolerance: 0.5

    # Z-axis filter in target_frame.
    min_height: 0.05
    max_height: 0.30

    # Angular sweep. ±50° covers the D555's ~87° horizontal FOV with
    # headroom; bearings outside the cloud's coverage publish as inf.
    angle_min: -0.873
    angle_max: 0.873
    angle_increment: 0.00873
    scan_time: 0.0333

    # Range — overridden at launch from strafer_shared.constants
    # (DEPTH_MIN / DEPTH_MAX).
    range_min: 0.4
    range_max: 6.0

    use_inf: true
    inf_epsilon: 1.0
