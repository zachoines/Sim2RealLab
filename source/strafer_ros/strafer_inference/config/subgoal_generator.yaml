strafer_subgoal_generator:
  ros__parameters:
    # Fallback plan input; the primary path comes from this node's own
    # ComputePathToPose requests. /plan is Nav2's stock default (not
    # remapped here) — override if the planner is namespaced.
    plan_topic: "/plan"

    # Replan ownership: while the inference node's active-goal telemetry
    # is fresh, request ComputePathToPose on this cadence. Must stay below
    # path_timeout_s (the plan-staleness suppression window) or the plan
    # goes stale between replans.
    replan_period_s: 0.5
    active_goal_topic: "/strafer_inference/active_goal"
    # Telemetry keep-alive is ~1 Hz from the inference node; 2.5 s
    # tolerates one missed message plus publish jitter before
    # replanning stops.
    goal_telemetry_timeout_s: 2.5
    planner_action: "/compute_path_to_pose"
    planner_id: "GridBased"

    # Dedicated rolling-subgoal channel. The mission goal is not a topic —
    # it arrives via navigate_to_pose, and a new goal there resets the
    # policy's hidden state, so the streamed subgoal stays separate.
    subgoal_topic: "/strafer/subgoal"

    map_frame: "map"
    base_frame: "base_link"

    # update_period_s and lookahead_m are omitted on purpose: the node
    # defaults them from strafer_shared.constants (POLICY_SIM_DT *
    # POLICY_DECIMATION, SUBGOAL_LOOKAHEAD_M) so the policy rate and
    # train/deploy parity can't drift via a config literal. Set here only
    # for a deliberate operator override.

    # 0 means "use the path as published"; >= 2 head-first truncates.
    max_path_points: 0

    # Stop publishing the subgoal once /plan ages past this, so a wedged
    # global planner reaches the inference node's subgoal watchdog rather
    # than the policy chasing a stale path. Generator half of a split
    # budget (~1.0 s here + ~1.0 s in the watchdog before /cmd_vel zeros).
    path_timeout_s: 1.0
